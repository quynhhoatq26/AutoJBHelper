name: Build AutoJBHelper IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ldid
        run: |
          brew install ldid
          which ldid

      - name: Setup Theos
        uses: actions/checkout@v4
        with:
          repository: theos/theos
          ref: master
          path: theos
          submodules: recursive

      - name: Setup SDK
        run: |
          wget https://github.com/theos/sdks/archive/master.zip -O sdks.zip
          unzip -q sdks.zip
          mv sdks-master/*.sdk theos/sdks/
          rm -rf sdks-master sdks.zip

      - name: Build .app
        env:
          THEOS: ${{ github.workspace }}/theos
        run: |
          # Chi build .app, khong build .deb package
          make FINALPACKAGE=1
          
          # Tim .app da build
          APP_PATH=$(find .theos -name "AutoJBHelper.app" -type d | head -1)
          echo "App path: $APP_PATH"
          ls -la "$APP_PATH"

      - name: Create IPA
        env:
          THEOS: ${{ github.workspace }}/theos
        run: |
          mkdir -p output
          
          # Tim .app
          APP_PATH=$(find .theos -name "AutoJBHelper.app" -type d | head -1)
          
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Khong tim thay AutoJBHelper.app"
            exit 1
          fi
          
          # Tao IPA tu .app
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r output/AutoJBHelper.ipa Payload
          rm -rf Payload
          
          ls -la output/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: AutoJBHelper-IPA
          path: output/*.ipa
          if-no-files-found: error
