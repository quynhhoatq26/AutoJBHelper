name: Build AutoJBHelper IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install Theos
        run: |
          brew install ldid dpkg make
          git clone --recursive https://github.com/theos/theos.git ~/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      - name: Install iOS SDK
        run: |
          cd ~/theos/sdks
          wget https://github.com/theos/sdks/archive/master.zip
          unzip -q master.zip
          mv sdks-master/*.sdk .
          rm -rf sdks-master master.zip

      - name: Build .app
        run: |
          export THEOS=$HOME/theos
          make clean
          make

      - name: Find .app and Package IPA
        run: |
          # Tim thu muc .app
          APP_PATH=$(find . -name "AutoJBHelper.app" -type d | head -1)
          echo "Found app at: $APP_PATH"
          
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: AutoJBHelper.app not found!"
            find . -name "*.app" -type d
            exit 1
          fi
          
          # Re-sign voi entitlements
          ldid -SAutoJBHelper/entitlements.plist "$APP_PATH/AutoJBHelper"
          
          # Tao IPA
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r AutoJBHelper.ipa Payload
          rm -rf Payload
          
          # Verify
          echo "IPA contents:"
          unzip -l AutoJBHelper.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: AutoJBHelper-IPA
          path: AutoJBHelper.ipa
