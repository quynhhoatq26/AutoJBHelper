name: Build AutoJBHelper IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ldid
        run: |
          brew install ldid
          which ldid
          ldid -h || true

      - name: Setup Theos
        uses: actions/checkout@v4
        with:
          repository: theos/theos
          ref: master
          path: theos
          submodules: recursive

      - name: Setup SDK
        run: |
          wget https://github.com/theos/sdks/archive/master.zip -O sdks.zip
          unzip -q sdks.zip
          mv sdks-master/*.sdk theos/sdks/
          rm -rf sdks-master sdks.zip

      - name: Build IPA
        env:
          THEOS: ${{ github.workspace }}/theos
        run: |
          make package FINALPACKAGE=1 IPA=1
          ls -la packages/ || true
          mkdir -p output
          cp packages/*.ipa output/AutoJBHelper.ipa 2>/dev/null || true
          
          if [ ! -f output/AutoJBHelper.ipa ]; then
            APP_PATH=$(find . -name "AutoJBHelper.app" -type d | head -1)
            if [ -n "$APP_PATH" ]; then
              mkdir -p Payload
              cp -R "$APP_PATH" Payload/
              zip -r output/AutoJBHelper.ipa Payload
              rm -rf Payload
            fi
          fi
          
          ls -la output/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: AutoJBHelper-IPA
          path: output/*.ipa
          if-no-files-found: error
