name: Build AutoJBHelper IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install Theos
        run: |
          brew install ldid dpkg make
          git clone --recursive https://github.com/theos/theos.git ~/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV

      - name: Install iOS SDK
        run: |
          cd ~/theos/sdks
          wget https://github.com/theos/sdks/archive/master.zip
          unzip -q master.zip
          mv sdks-master/*.sdk .
          rm -rf sdks-master master.zip

      - name: Build .app
        run: |
          export THEOS=$HOME/theos
          make clean
          make

      - name: Re-sign with entitlements
        run: |
          cd .theos/obj/arm64/AutoJBHelper.app
          ldid -S../../../../AutoJBHelper/entitlements.plist AutoJBHelper

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r .theos/obj/arm64/AutoJBHelper.app Payload/
          zip -r AutoJBHelper.ipa Payload
          rm -rf Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: AutoJBHelper-IPA
          path: AutoJBHelper.ipa
