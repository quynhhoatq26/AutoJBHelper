name: Build AutoJBHelper IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ldid
        run: |
          brew install ldid
          which ldid

      - name: Setup Theos
        uses: actions/checkout@v4
        with:
          repository: theos/theos
          ref: master
          path: theos
          submodules: recursive

      - name: Setup SDK
        run: |
          wget https://github.com/theos/sdks/archive/master.zip -O sdks.zip
          unzip -q sdks.zip
          mv sdks-master/*.sdk theos/sdks/
          rm -rf sdks-master sdks.zip

      - name: Build .app
        env:
          THEOS: ${{ github.workspace }}/theos
        run: |
          make FINALPACKAGE=1
          
          APP_PATH=$(find .theos -name "AutoJBHelper.app" -type d | head -1)
          echo "App path: $APP_PATH"
          ls -la "$APP_PATH"
          
          # Kiem tra Info.plist co trong app khong
          if [ ! -f "$APP_PATH/Info.plist" ]; then
            echo "Info.plist missing, copying manually..."
            cp AutoJBHelper/Info.plist "$APP_PATH/Info.plist"
          fi
          
          echo "=== After fix ==="
          ls -la "$APP_PATH"

      - name: Re-sign with entitlements
        env:
          THEOS: ${{ github.workspace }}/theos
        run: |
          APP_PATH=$(find .theos -name "AutoJBHelper.app" -type d | head -1)
          BINARY="$APP_PATH/AutoJBHelper"
          
          # Re-sign binary voi entitlements
          ldid -Sentitlements.plist "$BINARY"
          
          # Verify
          ldid -e "$BINARY" | head -30

      - name: Create IPA
        env:
          THEOS: ${{ github.workspace }}/theos
        run: |
          mkdir -p output
          
          APP_PATH=$(find .theos -name "AutoJBHelper.app" -type d | head -1)
          
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Khong tim thay AutoJBHelper.app"
            exit 1
          fi
          
          # Tao IPA
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r output/AutoJBHelper.ipa Payload
          rm -rf Payload
          
          echo "=== IPA contents ==="
          unzip -l output/AutoJBHelper.ipa
          ls -la output/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: AutoJBHelper-IPA
          path: output/*.ipa
          if-no-files-found: error
